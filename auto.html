<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cribot - Robôs Auto</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: { extend: { colors: { bitcoin: '#F7931A' }, fontFamily: { inter: ['Inter', 'sans-serif'] } } }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
    </style>
</head>

<body class="min-h-screen flex flex-col pb-24 md:pb-8 bg-gray-50 relative">

    <div id="toastPopup" class="fixed top-6 left-1/2 transform -translate-x-1/2 -translate-y-[200%] px-5 py-3.5 rounded-[1rem] flex items-center gap-3 text-white font-medium transition-all duration-500 opacity-0 z-[9999] min-w-max border shadow-2xl pointer-events-none">
        <span id="toastIcon" class="material-icons text-xl">info</span>
        <span id="toastMsg" class="text-[0.85rem] font-bold">Notificação</span>
    </div>

    <div class="w-full md:ml-64 md:max-w-[calc(100%-16rem)] z-0 block">
        <!-- Banner topo -->
        <img src="https://i.ibb.co/q3MbGR5V/1779983504560.png" alt="Banner Robôs Auto" class="w-full h-auto object-cover rounded-b-[1.5rem] shadow-sm" referrerpolicy="no-referrer">
    </div>

    <main class="flex-1 w-full max-w-4xl mx-auto px-5 pt-6 flex flex-col gap-8 relative z-10 md:ml-64 md:max-w-[calc(100%-16rem)]">
        
        <div>
            <div class="flex items-center mb-4">
                <h3 class="text-lg font-black text-gray-900">Minhas Máquinas Ativas</h3>
            </div>
            <div id="activeBotsContainer" class="flex flex-col gap-4">
                <div class="flex flex-col items-center justify-center py-8 text-gray-400">
                    <svg class="animate-spin h-8 w-8 text-bitcoin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg>
                </div>
            </div>
        </div>

        <div class="mb-8" id="lojaSecao">
            <div class="flex justify-between items-end mb-4">
                <h3 class="text-lg font-black text-gray-900">Loja de Robôs</h3>
            </div>
            <div id="storeBotsContainer" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            </div>
        </div>

    </main>

    <!-- MENU INFERIOR MOBILE -->
    <nav class="md:hidden fixed bottom-0 left-0 w-full bg-white border-t border-gray-100 z-30 pb-safe shadow-[0_-4px_10px_rgba(0,0,0,0.03)]">
        <div class="flex justify-between items-center h-16 px-4 sm:px-6">
            <a href="dashboard.html" class="flex flex-col items-center justify-center text-gray-400 hover:text-gray-900 w-14 transition-colors">
                <img src="https://i.ibb.co/HThdL6Zc/76505-removebg-preview.png" alt="Início" class="h-6 w-6 object-contain mb-1" referrerpolicy="no-referrer">
                <span class="text-[0.65rem] font-medium">Início</span>
            </a>
            
            <a href="mercado.html" class="flex flex-col items-center justify-center text-gray-400 hover:text-gray-900 w-14 transition-colors">
                <span class="iconify text-[1.40rem] mb-1" data-icon="cryptocurrency-color:btc"></span>
                <span class="text-[0.65rem] font-medium">Mercado</span>
            </a>
            
            <a href="auto.html" class="flex flex-col items-center justify-center text-bitcoin w-14 transition-transform active:scale-95">
                <img src="https://i.ibb.co/S4Z2THnC/77032-removebg-preview.png" alt="Auto" class="h-6 w-6 object-contain mb-1" referrerpolicy="no-referrer">
                <span class="text-[0.65rem] font-bold">Auto</span>
            </a>

            <a href="equipa.html" class="flex flex-col items-center justify-center text-gray-400 hover:text-gray-900 w-14 transition-colors">
                <img src="https://i.ibb.co/1fFPT3J0/teams-3d-icon-png-download-8894250.png" alt="Equipa" class="h-6 w-6 object-contain mb-1" referrerpolicy="no-referrer">
                <span class="text-[0.65rem] font-medium">Equipa</span>
            </a>
            
            <a href="perfil.html" class="flex flex-col items-center justify-center text-gray-400 hover:text-gray-900 w-14 transition-colors">
                <img src="https://i.ibb.co/RTrC0N4B/1780052456588.png" alt="Perfil" class="h-6 w-6 object-contain mb-1" referrerpolicy="no-referrer">
                <span class="text-[0.65rem] font-medium">Perfil</span>
            </a>
        </div>
    </nav>

    <!-- MENU LATERAL DESKTOP -->
    <aside class="hidden md:flex flex-col fixed top-0 left-0 w-64 h-screen bg-white border-r border-gray-100 z-30 pt-8 shadow-sm">
        <div class="px-6 mb-8 flex items-center gap-3">
            <img src="https://i.ibb.co/V07K9jG2/Boneco-3-D-CRIBOT-com-Dinheiro.png" alt="Logo" class="h-10 object-contain" referrerpolicy="no-referrer">
            <span class="font-bold text-xl text-gray-900">Cribot</span>
        </div>
        
        <a href="dashboard.html" class="flex items-center gap-3 px-6 py-4 text-gray-500 hover:bg-gray-50 hover:text-gray-900 font-medium transition-colors">
            <img src="https://i.ibb.co/HThdL6Zc/76505-removebg-preview.png" class="h-5 w-5 object-contain" referrerpolicy="no-referrer"> Início
        </a>
        <a href="mercado.html" class="flex items-center gap-3 px-6 py-4 text-gray-500 hover:bg-gray-50 hover:text-gray-900 font-medium transition-colors">
            <span class="iconify text-xl" data-icon="cryptocurrency-color:btc"></span> Mercado BTC/USDT
        </a>
        <a href="auto.html" class="flex items-center gap-3 px-6 py-4 text-bitcoin bg-orange-50 font-bold border-r-4 border-bitcoin">
            <img src="https://i.ibb.co/S4Z2THnC/77032-removebg-preview.png" class="h-5 w-5 object-contain" referrerpolicy="no-referrer"> Robôs Auto
        </a>
        <a href="equipa.html" class="flex items-center gap-3 px-6 py-4 text-gray-500 hover:bg-gray-50 hover:text-gray-900 font-medium transition-colors">
            <img src="https://i.ibb.co/1fFPT3J0/teams-3d-icon-png-download-8894250.png" class="h-5 w-5 object-contain" referrerpolicy="no-referrer"> Minha Equipa
        </a>
        <a href="perfil.html" class="flex items-center gap-3 px-6 py-4 text-gray-500 hover:bg-gray-50 hover:text-gray-900 font-medium transition-colors">
            <img src="https://i.ibb.co/RTrC0N4B/1780052456588.png" class="h-5 w-5 object-contain" referrerpolicy="no-referrer"> Meu Perfil
        </a>
    </aside>

    <script>
        const API_URL = 'https://twoou3.onrender.com/api';
        let token = localStorage.getItem('token');
        const formatMT = (value) => Number(value).toLocaleString('pt-MZ', { minimumFractionDigits: 2 }) + ' MT';

        document.addEventListener("DOMContentLoaded", async () => {
            if (!token) { window.location.href = 'index.html'; return; }
            await carregarDados();
        });

        function exibirToast(texto, tipo = 'error') {
            const caixa = document.getElementById('toastPopup');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMsg');

            caixa.classList.remove('bg-red-500', 'border-red-600', 'bg-gray-900', 'border-gray-800');
            if (tipo === 'error') {
                 caixa.classList.add('bg-red-500', 'border-red-600'); icon.textContent = "error_outline"; 
            } else {
                 caixa.classList.add('bg-gray-900', 'border-gray-800'); icon.textContent = "check_circle"; 
            }
            msg.textContent = texto;
            caixa.style.transform = 'translate(-50%, 0)';
            caixa.style.opacity = '1';

            setTimeout(() => {
                caixa.style.transform = 'translate(-50%, -200%)';
                caixa.style.opacity = '0';
            }, 3500); 
        }

        async function carregarDados() {
            try {
                const resDash = await fetch(`${API_URL}/user/dashboard`, { headers: { 'Authorization': `Bearer ${token}` } });
                const dataDash = await resDash.json();
                
                let currentBotPrice = 0;

                if (resDash.ok) {
                    renderizarRobosAtivos(dataDash.activeInvestments);
                    if (dataDash.activeInvestments && dataDash.activeInvestments.length > 0) {
                        currentBotPrice = dataDash.activeInvestments[0].bot.price;
                    }
                } else if (resDash.status === 401) {
                    localStorage.removeItem('token'); window.location.href = 'index.html';
                }

                const resBots = await fetch(`${API_URL}/user/bots`, { headers: { 'Authorization': `Bearer ${token}` } });
                const dataBots = await resBots.json();
                
                if (resBots.ok) {
                    renderizarLojaBots(dataBots, currentBotPrice);
                }

            } catch (err) {
                exibirToast('Sem ligação ao servidor.', 'error');
            }
        }

        async function coletarLucro(investmentId) {
            try {
                const res = await fetch(`${API_URL}/user/collect-profit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ investmentId })
                });
                const data = await res.json();

                if (res.ok) {
                    exibirToast(`Coletado com sucesso! +${formatMT(data.collected)}`, 'success');
                    await carregarDados(); 
                } else {
                    exibirToast(data.error || 'Erro ao coletar lucros.', 'error');
                }
            } catch (err) {
                exibirToast('Sem ligação ao servidor.', 'error');
            }
        }

        function renderizarRobosAtivos(investimentos) {
            const container = document.getElementById('activeBotsContainer');
            
            if (!investimentos || investimentos.length === 0) {
                container.innerHTML = `
                    <div class="bg-gradient-to-br from-[#FF5E00] to-[#F7931A] rounded-[2rem] p-6 sm:p-8 flex flex-row items-center justify-between border border-white/20 shadow-lg relative overflow-hidden min-h-[160px]">
                        <div class="flex flex-col z-10 w-[60%] sm:w-2/3 pr-2">
                            <span class="font-black text-white text-xl sm:text-2xl leading-tight mb-2 tracking-tight">Zero máquinas</span>
                            <span class="text-[0.70rem] sm:text-sm text-white/90 font-medium leading-snug mb-4">Adquira um robô abaixo para gerar lucros diários na sua conta.</span>
                            <button onclick="document.getElementById('lojaSecao').scrollIntoView({behavior: 'smooth'})" class="bg-white text-[#FF5E00] text-xs sm:text-sm font-black py-2.5 px-5 rounded-xl shadow-sm active:scale-95 transition-transform w-max">
                                Comprar Agora
                            </button>
                        </div>
                        <img src="https://i.ibb.co/JWnK4KfS/Adobe-Express-file.png" alt="Sem robô" class="absolute right-0 bottom-0 h-40 w-40 sm:h-48 sm:w-48 object-contain object-bottom transform translate-x-4 translate-y-4 z-0 drop-shadow-xl" referrerpolicy="no-referrer">
                    </div>
                `;
                return;
            }

            container.innerHTML = investimentos.map(inv => {
                const bot = inv.bot;
                if (!bot) return '';

                const hoje = new Date();
                const fim = new Date(inv.endDate);
                let diasRestantes = Math.ceil((fim - hoje) / (1000 * 60 * 60 * 24));
                if (diasRestantes < 0) diasRestantes = 0;

                const percentagem = Math.min(100, Math.round(((bot.durationDays - diasRestantes) / bot.durationDays) * 100));
                const lucroAguardando = inv.uncollectedProfit || 0;

                return `
                <div class="bg-gradient-to-r from-gray-900 to-gray-800 rounded-2xl p-5 shadow-lg border border-gray-700 relative overflow-hidden">
                    <div class="absolute -right-4 -top-4 w-24 h-24 bg-bitcoin/20 rounded-full blur-2xl"></div>
                    
                    <div class="flex justify-between items-start mb-4 relative z-10">
                        <div class="flex items-center gap-3">
                            <img src="${bot.image || 'https://i.ibb.co/S4Z2THnC/77032-removebg-preview.png'}" class="h-10 w-10 object-cover rounded-full bg-white/10 p-1 border border-white/20" referrerpolicy="no-referrer">
                            <div class="flex flex-col">
                                <span class="font-black text-white text-base">${bot.name}</span>
                                <span class="text-[0.65rem] text-bitcoin font-bold uppercase tracking-widest flex items-center gap-1">
                                    <span class="animate-pulse w-1.5 h-1.5 rounded-full bg-[#00c853]"></span> Máquina Ativa
                                </span>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-4 relative z-10">
                        <div class="flex flex-col bg-white/5 rounded-xl p-3 border border-white/10">
                            <span class="text-[0.60rem] text-gray-400 font-bold uppercase tracking-widest">Já Transferido</span>
                            <span class="font-black text-[#00c853] text-lg">+${formatMT(inv.accumulatedProfit || 0)}</span>
                        </div>
                        <div class="flex flex-col bg-white/5 rounded-xl p-3 border border-white/10">
                            <span class="text-[0.60rem] text-gray-400 font-bold uppercase tracking-widest">Tempo Restante</span>
                            <span class="font-black text-white text-lg">${diasRestantes} Dias</span>
                        </div>
                    </div>

                    <div class="w-full bg-gray-700 rounded-full h-1.5 mt-2 mb-4 relative z-10">
                        <div class="bg-bitcoin h-1.5 rounded-full transition-all duration-1000" style="width: ${percentagem}%"></div>
                    </div>

                    <div class="mt-2 relative z-10">
                        ${ lucroAguardando > 0 
                           ? `<button onclick="coletarLucro('${inv._id}')" class="w-full bg-[#00c853] hover:bg-[#00e676] text-white font-black py-3.5 rounded-xl flex items-center justify-center gap-2 shadow-[0_0_15px_rgba(0,200,83,0.3)] active:scale-95 transition-all">
                                Coletar Hoje: ${formatMT(lucroAguardando)} <span class="material-icons text-[1.1rem]">payments</span>
                              </button>`
                           : `<button disabled class="w-full bg-gray-800 text-gray-400 font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 border border-gray-700/50 cursor-not-allowed">
                                Aguardando 00:00 (Maputo) <span class="material-icons text-sm opacity-50">schedule</span>
                              </button>`
                        }
                    </div>
                </div>
                `;
            }).join('');
        }

        function renderizarLojaBots(bots, currentBotPrice) {
            const container = document.getElementById('storeBotsContainer');
            
            if (!bots || bots.length === 0) {
                container.innerHTML = `<p class="text-sm font-bold text-gray-500 w-full col-span-2 text-center py-6">Nenhum robô disponível na loja.</p>`;
                return;
            }

            container.innerHTML = bots.map(bot => {
                let btnHtml = '';
                
                if (currentBotPrice > 0) {
                    if (bot.price <= currentBotPrice) {
                        btnHtml = `
                        <button disabled class="mt-2 w-full bg-gray-100 text-gray-400 font-bold py-3.5 rounded-xl flex items-center justify-center gap-2 border border-gray-200 cursor-not-allowed">
                            Máquina Inferior ou Igual
                        </button>`;
                    } else {
                        const diferenca = bot.price - currentBotPrice;
                        btnHtml = `
                        <button onclick="comprarBot('${bot._id}', ${diferenca}, true)" class="mt-2 w-full bg-[#00c853] hover:bg-[#00e676] text-white font-bold py-3.5 rounded-xl active:scale-95 transition-all flex items-center justify-center gap-2 shadow-[0_5px_15px_rgba(0,200,83,0.2)]">
                            Atualizar (+${formatMT(diferenca)}) <span class="material-icons text-[1.1rem]">upgrade</span>
                        </button>`;
                    }
                } else {
                    btnHtml = `
                    <button onclick="comprarBot('${bot._id}', ${bot.price}, false)" class="mt-2 w-full bg-gray-900 hover:bg-black text-white font-bold py-3.5 rounded-xl active:scale-95 transition-all flex items-center justify-center gap-2 shadow-md">
                        Comprar Máquina <span class="material-icons text-[1.1rem]">shopping_cart</span>
                    </button>`;
                }

                return `
                <div class="bg-white border border-gray-200 shadow-sm rounded-2xl p-4 flex flex-col gap-3 transition-transform hover:shadow-md">
                    <div class="flex items-center gap-3 border-b border-gray-100 pb-3">
                        <div class="bg-orange-50 w-12 h-12 rounded-xl flex items-center justify-center shrink-0 border border-orange-100">
                            <img src="${bot.image || 'https://i.ibb.co/S4Z2THnC/77032-removebg-preview.png'}" class="w-8 h-8 object-contain" referrerpolicy="no-referrer">
                        </div>
                        <div class="flex flex-col">
                            <h3 class="font-black text-gray-900 text-sm leading-tight">${bot.name}</h3>
                            <span class="text-[0.65rem] text-bitcoin font-bold uppercase tracking-widest">IA Automática</span>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 gap-y-3 gap-x-2 text-sm mt-1">
                        <div class="flex flex-col">
                            <span class="text-[0.60rem] text-gray-400 uppercase font-bold tracking-wide">Preço Base</span>
                            <span class="font-black text-gray-900">${formatMT(bot.price)}</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[0.60rem] text-gray-400 uppercase font-bold tracking-wide">Duração</span>
                            <span class="font-black text-gray-900">${bot.durationDays} Dias</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[0.60rem] text-gray-400 uppercase font-bold tracking-wide">Ganhos / Dia</span>
                            <span class="font-black text-[#00c853]">+${formatMT(bot.dailyProfit)}</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-[0.60rem] text-gray-400 uppercase font-bold tracking-wide">Total Previsto</span>
                            <span class="font-black text-bitcoin">${formatMT(bot.totalReturn)}</span>
                        </div>
                    </div>

                    ${btnHtml}
                </div>
                `;
            }).join('');
        }

        async function comprarBot(botId, valorParaPagar, isUpgrade) {
            const acao = isUpgrade ? 'fazer a atualização para' : 'comprar';
            const confirmar = confirm(`Confirma ${acao} este robô por ${formatMT(valorParaPagar)}?\nO valor será deduzido do seu saldo real.`);
            if (!confirmar) return;

            try {
                const res = await fetch(`${API_URL}/user/buy-bot`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ botId })
                });
                
                const data = await res.json();

                if (res.ok) {
                    exibirToast(isUpgrade ? 'Atualização feita com sucesso!' : 'Robô ativado com sucesso!', 'success');
                    await carregarDados(); 
                } else {
                    exibirToast(data.error || 'Erro ao processar compra.', 'error');
                }
            } catch (err) {
                exibirToast('Sem ligação ao servidor.', 'error');
            }
        }
    </script>
</body>
</html>
