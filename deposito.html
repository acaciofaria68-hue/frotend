<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cribot - Depositar</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: { extend: { colors: { bitcoin: '#F7931A' }, fontFamily: { inter: ['Inter', 'sans-serif'] } } }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-24 md:pb-8 bg-white relative">

    <div id="toastPopup" class="fixed top-6 left-1/2 transform -translate-x-1/2 -translate-y-[200%] px-5 py-3 rounded-xl flex items-center gap-3 text-white font-medium transition-all duration-500 opacity-0 z-[9999] min-w-max border shadow-2xl pointer-events-none">
        <span id="toastIcon" class="material-icons text-xl">info</span>
        <span id="toastMsg" class="text-[0.85rem] font-bold">Notificação</span>
    </div>

    <!-- CABEÇALHO -->
    <div class="pt-6 pb-4 px-4 relative z-10 flex flex-col items-center border-b border-gray-100 bg-white">
        <div class="w-full max-w-lg flex justify-start items-center gap-3">
            <button onclick="window.history.back()" class="text-gray-500 hover:text-gray-900 active:scale-95 transition-transform flex items-center justify-center bg-gray-50 h-10 w-10 rounded-xl border border-gray-200 shadow-sm">
                <span class="material-icons text-lg">arrow_back</span>
            </button>
            <h1 class="text-xl font-black text-gray-900">Novo Depósito</h1>
        </div>
    </div>

    <!-- FORMULÁRIO E INSTRUÇÕES -->
    <main class="flex-1 w-full max-w-lg mx-auto px-4 pt-6 flex flex-col relative z-10">
        
        <!-- ALERTA DE TEMPO -->
        <div class="bg-red-600 text-white px-4 py-3.5 rounded-xl text-sm font-bold flex items-center justify-between mb-5 shadow-md">
            <span class="flex items-center gap-1.5"><span class="material-icons text-[1.2rem]">timer</span> Tempo para concluir</span>
            <span id="timerDisplay" class="font-black text-lg tracking-widest">05:00</span>
        </div>

        <!-- DADOS DE PAGAMENTO -->
        <div class="flex items-start gap-4 mb-6 pb-6 border-b border-gray-100" id="metodoHeader">
            <span class="text-xs text-gray-400 font-bold">A carregar detalhes de pagamento...</span>
        </div>

        <form id="formDeposito" class="flex flex-col gap-4">
            
            <div class="bg-blue-600 text-white p-3.5 flex items-start gap-3 mb-2 rounded-xl shadow-md">
                <span class="material-icons text-white text-base mt-0.5">info</span>
                <p class="text-[0.75rem] text-white/95 font-medium leading-relaxed">Faça a transferência para o número listado acima. Pode inserir o ID da Transação ou anexar o comprovativo.</p>
            </div>

            <div class="flex flex-col gap-1.5 w-full">
                <label class="text-[0.70rem] font-bold text-gray-600 uppercase tracking-widest">Valor a Depositar (MT)</label>
                <input type="number" id="depAmount" required placeholder="A carregar limites..." class="w-full rounded-xl border border-gray-300 py-3.5 px-4 text-gray-900 font-black text-base focus:border-[#00c853] focus:ring-1 focus:ring-[#00c853] outline-none transition-colors">
            </div>

            <div class="flex flex-col gap-1.5 w-full">
                <label class="text-[0.70rem] font-bold text-gray-600 uppercase tracking-widest">ID da Transação / Referência</label>
                <input type="text" id="depTxId" placeholder="Ex: 8XG9... (Opcional se enviar imagem)" class="w-full rounded-xl border border-gray-300 py-3.5 px-4 text-gray-900 font-black focus:border-[#00c853] focus:ring-1 focus:ring-[#00c853] outline-none transition-colors">
            </div>

            <!-- NOVO CAMPO: UPLOAD DE COMPROVATIVO -->
            <div class="flex flex-col gap-1.5 w-full">
                <label class="text-[0.70rem] font-bold text-gray-600 uppercase tracking-widest">Comprovativo de Pagamento</label>
                <div class="relative w-full">
                    <input type="file" id="depImage" accept="image/*" class="hidden">
                    <button type="button" onclick="document.getElementById('depImage').click()" class="w-full bg-gray-50 border border-gray-300 py-3.5 px-4 rounded-xl text-gray-700 font-bold flex items-center justify-center gap-2 hover:bg-gray-100 transition-colors">
                        <span class="material-icons">add_photo_alternate</span> Enviar Imagem / Foto
                    </button>
                </div>
                <!-- PREVIEW DA IMAGEM -->
                <div id="imagePreviewContainer" class="hidden mt-2 relative w-full h-40 rounded-xl overflow-hidden border border-gray-200 bg-gray-50 flex items-center justify-center">
                    <img id="imagePreview" src="" class="max-w-full max-h-full object-contain">
                    <button type="button" onclick="removeImage()" class="absolute top-2 right-2 bg-red-500 text-white rounded-full p-1.5 shadow-md active:scale-90 transition-transform">
                        <span class="material-icons text-sm">close</span>
                    </button>
                </div>
            </div>

            <button type="submit" id="btnDep" class="w-full bg-[#00c853] hover:bg-[#00e676] text-white font-black py-4 rounded-xl mt-4 active:scale-95 transition-transform flex justify-center items-center gap-2 shadow-md">
                Confirmar Depósito <span class="material-icons text-lg">check_circle</span>
            </button>
        </form>

    </main>

    <script>
        const API_URL = 'https://twoou3.onrender.com/api';
        let token = localStorage.getItem('token');
        let minDep = 100;
        let maxDep = 100000;
        let selectedImageBase64 = null;
        
        let timerSeconds = 300; 
        let timerInterval;

        document.addEventListener("DOMContentLoaded", async () => {
            if (!token) { window.location.href = 'index.html'; return; }
            await carregarMetodoDePagamento();
            iniciarCronometro();
        });

        // Manipulação da Imagem de Comprovativo
        document.getElementById('depImage').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                // Validação simples de tamanho (ex: max 5MB)
                if(file.size > 5 * 1024 * 1024) {
                    exibirToast('A imagem deve ter no máximo 5MB', 'error');
                    return;
                }
                const reader = new FileReader();
                reader.onload = function(evt) {
                    selectedImageBase64 = evt.target.result;
                    document.getElementById('imagePreview').src = selectedImageBase64;
                    document.getElementById('imagePreviewContainer').classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        function removeImage() {
            selectedImageBase64 = null;
            document.getElementById('depImage').value = '';
            document.getElementById('imagePreviewContainer').classList.add('hidden');
        }

        function iniciarCronometro() {
            const timerEl = document.getElementById('timerDisplay');
            timerInterval = setInterval(() => {
                timerSeconds--;
                if (timerSeconds <= 0) {
                    clearInterval(timerInterval);
                    exibirToast('O tempo para depósito expirou!', 'error');
                    setTimeout(() => window.history.back(), 2000);
                } else {
                    const m = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
                    const s = String(timerSeconds % 60).padStart(2, '0');
                    timerEl.innerText = `${m}:${s}`;
                }
            }, 1000);
        }

        async function carregarMetodoDePagamento() {
            const urlParams = new URLSearchParams(window.location.search);
            const metodo = urlParams.get('metodo');
            const header = document.getElementById('metodoHeader');
            
            try {
                const res = await fetch(`${API_URL}/user/settings`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();

                if (res.ok) {
                    minDep = data.minDeposit || 100;
                    maxDep = data.maxDeposit || 100000;
                    document.getElementById('depAmount').placeholder = `Min: ${minDep} | Max: ${maxDep}`;
                    document.getElementById('depAmount').min = minDep;
                    document.getElementById('depAmount').max = maxDep;
                }

                if (metodo === 'emola') {
                    const nome = data.emolaName || 'Cribot Lda';
                    const num = data.emolaNumber || '86 000 0000';
                    header.innerHTML = `
                        <img src="assets/images/logo-emola.png" class="h-14 w-14 object-cover rounded-2xl shadow-sm border border-gray-100 shrink-0">
                        <div class="flex flex-col flex-1">
                            <span class="text-[0.65rem] font-bold text-gray-400 uppercase tracking-widest leading-tight mb-0.5">Pagar para (e-Mola)</span>
                            <span class="font-black text-gray-900 text-sm leading-tight mb-1 truncate">${nome}</span>
                            <div class="flex items-center gap-2">
                                <span class="font-black text-[#00c853] text-lg leading-tight tracking-wide" id="payNumber">${num}</span>
                                <button type="button" onclick="copiarNumero('${num}')" class="bg-gray-100 hover:bg-gray-200 text-gray-500 p-1.5 rounded-lg active:scale-90 transition-all flex items-center justify-center">
                                    <span class="material-icons text-[1rem]">content_copy</span>
                                </button>
                            </div>
                        </div>
                    `;
                } else {
                    const nome = data.mpesaName || 'Cribot Lda';
                    const num = data.mpesaNumber || '84 000 0000';
                    header.innerHTML = `
                        <img src="assets/images/logo-mpesa.png" class="h-14 w-14 object-cover rounded-2xl shadow-sm border border-gray-100 shrink-0">
                        <div class="flex flex-col flex-1">
                            <span class="text-[0.65rem] font-bold text-gray-400 uppercase tracking-widest leading-tight mb-0.5">Pagar para (M-Pesa)</span>
                            <span class="font-black text-gray-900 text-sm leading-tight mb-1 truncate">${nome}</span>
                            <div class="flex items-center gap-2">
                                <span class="font-black text-[#00c853] text-lg leading-tight tracking-wide" id="payNumber">${num}</span>
                                <button type="button" onclick="copiarNumero('${num}')" class="bg-gray-100 hover:bg-gray-200 text-gray-500 p-1.5 rounded-lg active:scale-90 transition-all flex items-center justify-center">
                                    <span class="material-icons text-[1rem]">content_copy</span>
                                </button>
                            </div>
                        </div>
                    `;
                }
            } catch (err) {
                header.innerHTML = `<span class="text-xs text-red-500 font-bold">Erro ao carregar detalhes de pagamento.</span>`;
            }
        }

        function copiarNumero(num) {
            navigator.clipboard.writeText(num).then(() => {
                exibirToast('Número copiado com sucesso!', 'success');
            }).catch(() => {
                exibirToast('Não foi possível copiar o número.', 'error');
            });
        }

        function exibirToast(texto, tipo = 'info') {
            const caixa = document.getElementById('toastPopup');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMsg');

            caixa.classList.remove('bg-red-500', 'border-red-600', 'bg-gray-900', 'border-gray-800');
            if (tipo === 'error') {
                 caixa.classList.add('bg-red-500', 'border-red-600'); icon.textContent = "error_outline"; 
            } else {
                 caixa.classList.add('bg-gray-900', 'border-gray-800'); icon.textContent = "check_circle"; 
            }
            msg.textContent = texto;
            caixa.style.transform = 'translate(-50%, 0)';
            caixa.style.opacity = '1';

            setTimeout(() => {
                caixa.style.transform = 'translate(-50%, -200%)';
                caixa.style.opacity = '0';
            }, 3000); 
        }

        document.getElementById('formDeposito').addEventListener('submit', async (e) => {
            e.preventDefault();
            const amount = Number(document.getElementById('depAmount').value);
            const txId = document.getElementById('depTxId').value.trim();
            
            if (amount < minDep) return exibirToast(`O depósito mínimo é de ${minDep} MT.`, 'error');
            if (amount > maxDep) return exibirToast(`O depósito máximo é de ${maxDep} MT.`, 'error');

            if (!txId && !selectedImageBase64) {
                return exibirToast('Por favor, insira o ID da Transação ou envie a imagem do comprovativo.', 'error');
            }

            const btn = document.getElementById('btnDep');
            btn.disabled = true; btn.innerHTML = 'Processando...';
            clearInterval(timerInterval); 

            try {
                const res = await fetch(`${API_URL}/user/deposit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    // Envia a imagem convertida em Base64 para o servidor
                    body: JSON.stringify({ amount, txId, receiptImage: selectedImageBase64 })
                });
                const data = await res.json();

                if (res.ok) {
                    exibirToast(data.message, 'success');
                    setTimeout(() => window.location.href = 'carteira.html', 1500);
                } else {
                    exibirToast(data.error, 'error');
                    btn.disabled = false; btn.innerHTML = `Confirmar Depósito <span class="material-icons text-lg">check_circle</span>`;
                    iniciarCronometro(); 
                }
            } catch (err) { 
                exibirToast('Erro de conexão.', 'error'); 
                btn.disabled = false; btn.innerHTML = `Confirmar Depósito <span class="material-icons text-lg">check_circle</span>`;
                iniciarCronometro(); 
            }
        });
    </script>
</body>
</html>
