<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cribot - Carteira</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: { extend: { colors: { bitcoin: '#F7931A' }, fontFamily: { inter: ['Inter', 'sans-serif'] } } }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
        .modal-overlay { background-color: rgba(0, 0, 0, 0.5); backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 999;}
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-content { transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-overlay.active .modal-content { transform: translateY(0); }
    </style>
</head>

<body class="min-h-screen flex flex-col pb-24 md:pb-8 bg-gray-50 relative">

    <div id="toastPopup" class="fixed top-6 left-1/2 transform -translate-x-1/2 -translate-y-[200%] px-5 py-3.5 rounded-[1rem] flex items-center gap-3 text-white font-medium transition-all duration-500 opacity-0 z-[9999] min-w-max border shadow-2xl pointer-events-none">
        <span id="toastIcon" class="material-icons text-xl">info</span>
        <span id="toastMsg" class="text-[0.85rem] font-bold">Notificação</span>
    </div>

    <div class="pt-6 pb-6 px-5 md:ml-64 relative z-10 flex flex-col items-center">
        
        <div class="w-full max-w-4xl flex justify-start mb-6">
            <button onclick="window.history.back()" class="text-gray-500 hover:text-gray-900 active:scale-95 transition-transform flex items-center gap-1 bg-white px-3 py-1.5 rounded-xl border border-gray-200 shadow-sm">
                <span class="material-icons text-sm">arrow_back</span> <span class="text-[0.65rem] font-bold uppercase tracking-widest">Voltar</span>
            </button>
        </div>

        <div class="w-full max-w-[340px] h-[210px] rounded-[1.5rem] p-6 shadow-2xl relative overflow-hidden flex flex-col justify-between border border-gray-700/50" style="background: linear-gradient(135deg, #111827 0%, #1f2937 100%);">
            <div class="absolute -right-16 -top-16 w-48 h-48 bg-bitcoin/20 rounded-full blur-3xl"></div>
            <div class="flex justify-between items-start z-10 relative w-full">
                <img src="assets/images/icon-chip.png" alt="Chip" class="h-14 w-[4.5rem] object-contain drop-shadow-md rounded-sm -ml-1">
                <span class="material-icons text-white/50 rotate-90 text-2xl mt-1">wifi</span>
            </div>
            <div class="flex flex-col z-10 relative mt-2">
                <span class="text-[0.55rem] font-bold text-gray-400 uppercase tracking-widest mb-1">Saldo Real</span>
                <span class="text-3xl font-black text-white tracking-widest" id="walletBalance">0,00 MT</span>
            </div>
            <div class="flex justify-between items-end z-10 relative w-full mb-1">
                <span class="font-bold tracking-widest uppercase text-[0.80rem] text-gray-300 truncate w-3/4" id="cardUserName">A CARREGAR...</span>
                <div class="flex">
                    <div class="w-6 h-6 rounded-full bg-[#FF5E00]/90 mix-blend-screen shadow-sm"></div>
                    <div class="w-6 h-6 rounded-full bg-[#F7931A]/90 mix-blend-screen -ml-2 shadow-sm"></div>
                </div>
            </div>
        </div>

        <div class="flex gap-4 mt-8 w-full max-w-[340px]">
            <button onclick="abrirModal('modalMetodoDeposito')" class="flex-1 bg-[#00c853] hover:bg-[#00e676] text-white py-3.5 rounded-2xl font-black text-sm active:scale-95 transition-transform flex items-center justify-center gap-2 shadow-[0_5px_15px_rgba(0,200,83,0.3)]">
                <span class="material-icons text-[1.2rem]">south_west</span> Depositar
            </button>
            <button id="btnLevantarCarteira" onclick="abrirModal('modalMetodoSaque')" class="flex-1 bg-gray-900 hover:bg-black text-white py-3.5 rounded-2xl font-black text-sm active:scale-95 transition-transform flex items-center justify-center gap-2 shadow-md">
                <span class="material-icons text-[1.2rem]">north_east</span> Levantar
            </button>
        </div>
    </div>

    <!-- ÁREA INFERIOR: HISTÓRICO -->
    <main class="flex-1 w-full max-w-4xl mx-auto px-6 mt-2 flex flex-col relative z-10 md:ml-64 md:max-w-[calc(100%-16rem)]">
        <div class="w-full min-h-[400px]">
            <div class="mb-2 pb-2">
                <h3 class="text-lg font-black text-gray-900">Extrato Financeiro</h3>
            </div>
            
            <div id="transactionsContainer" class="flex flex-col">
                <div class="flex justify-center py-10 text-gray-400">
                    <svg class="animate-spin h-8 w-8 text-bitcoin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path></svg>
                </div>
            </div>
        </div>
    </main>

    <!-- MODAIS DE SELEÇÃO DE MÉTODO -->
    <div id="modalMetodoDeposito" class="fixed inset-0 modal-overlay flex flex-col justify-end">
        <div class="bg-white w-full max-w-lg mx-auto rounded-t-3xl p-6 pb-10 modal-content shadow-2xl relative flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-gray-900 text-xl">Método de Depósito</h3>
                <button onclick="fecharModal('modalMetodoDeposito')" class="text-gray-400 bg-gray-50 rounded-full p-2 active:scale-95">
                    <span class="material-icons">close</span>
                </button>
            </div>
            
            <div class="flex gap-4">
                <button onclick="window.location.href='deposito.html?metodo=mpesa'" class="flex-1 bg-white border border-gray-200 p-5 rounded-2xl flex flex-col items-center justify-center gap-3 hover:bg-gray-50 active:scale-95 transition-all shadow-sm">
                    <img src="assets/images/logo-mpesa.png" alt="M-Pesa" class="h-12 w-12 object-cover rounded-xl shadow-sm border border-gray-100">
                    <span class="font-black text-gray-900 text-sm">M-Pesa</span>
                </button>

                <button onclick="window.location.href='deposito.html?metodo=emola'" class="flex-1 bg-white border border-gray-200 p-5 rounded-2xl flex flex-col items-center justify-center gap-3 hover:bg-gray-50 active:scale-95 transition-all shadow-sm">
                    <img src="assets/images/logo-emola.png" alt="e-Mola" class="h-12 w-12 object-cover rounded-xl shadow-sm border border-gray-100">
                    <span class="font-black text-gray-900 text-sm">e-Mola</span>
                </button>
            </div>
        </div>
    </div>

    <div id="modalMetodoSaque" class="fixed inset-0 modal-overlay flex flex-col justify-end">
        <div class="bg-white w-full max-w-lg mx-auto rounded-t-3xl p-6 pb-10 modal-content shadow-2xl relative flex flex-col">
            <div class="flex justify-between items-center mb-6">
                <h3 class="font-black text-gray-900 text-xl">Método de Levantamento</h3>
                <button onclick="fecharModal('modalMetodoSaque')" class="text-gray-400 bg-gray-50 rounded-full p-2 active:scale-95">
                    <span class="material-icons">close</span>
                </button>
            </div>
            
            <div class="flex gap-4">
                <button onclick="window.location.href='saque.html?metodo=mpesa'" class="flex-1 bg-white border border-gray-200 p-5 rounded-2xl flex flex-col items-center justify-center gap-3 hover:bg-gray-50 active:scale-95 transition-all shadow-sm">
                    <img src="assets/images/logo-mpesa.png" alt="M-Pesa" class="h-12 w-12 object-cover rounded-xl shadow-sm border border-gray-100">
                    <span class="font-black text-gray-900 text-sm">M-Pesa</span>
                </button>

                <button onclick="window.location.href='saque.html?metodo=emola'" class="flex-1 bg-white border border-gray-200 p-5 rounded-2xl flex flex-col items-center justify-center gap-3 hover:bg-gray-50 active:scale-95 transition-all shadow-sm">
                    <img src="assets/images/logo-emola.png" alt="e-Mola" class="h-12 w-12 object-cover rounded-xl shadow-sm border border-gray-100">
                    <span class="font-black text-gray-900 text-sm">e-Mola</span>
                </button>
            </div>
        </div>
    </div>

    <!-- MENU INFERIOR MOBILE -->
    <nav class="md:hidden fixed bottom-0 left-0 w-full bg-white border-t border-gray-100 z-30 pb-safe shadow-[0_-4px_10px_rgba(0,0,0,0.03)]">
        <div class="flex justify-between items-center h-16 px-4 sm:px-6">
            <a href="dashboard.html" class="flex flex-col items-center justify-center text-gray-400 hover:text-gray-900 w-14 transition-colors">
                <img src="assets/images/icon-home.png" alt="Início" class="h-6 w-6 object-contain mb-1">
                <span class="text-[0.65rem] font-medium">Início</span>
            </a>
            
            <a href="mercado.html" class="flex flex-col items-center justify-center text-gray-400 hover:text-gray-900 w-14 transition-colors">
                <span class="iconify text-[1.40rem] mb-1" data-icon="cryptocurrency-color:btc"></span>
                <span class="text-[0.65rem] font-medium">Mercado</span>
            </a>
            
            <a href="auto.html" class="flex flex-col items-center justify-center text-gray-400 hover:text-gray-900 w-14 transition-colors">
                <img src="assets/images/icon-auto.png" alt="Auto" class="h-6 w-6 object-contain mb-1">
                <span class="text-[0.65rem] font-medium">Auto</span>
            </a>

            <a href="equipa.html" class="flex flex-col items-center justify-center text-gray-400 hover:text-gray-900 w-14 transition-colors">
                <img src="assets/images/icon-team.png" alt="Equipa" class="h-6 w-6 object-contain mb-1">
                <span class="text-[0.65rem] font-medium">Equipa</span>
            </a>
            
            <a href="perfil.html" class="flex flex-col items-center justify-center text-gray-400 hover:text-gray-900 w-14 transition-colors">
                <img src="assets/images/icon-profile.png" alt="Perfil" class="h-6 w-6 object-contain mb-1">
                <span class="text-[0.65rem] font-medium">Perfil</span>
            </a>
        </div>
    </nav>

    <!-- MENU LATERAL DESKTOP -->
    <aside class="hidden md:flex flex-col fixed top-0 left-0 w-64 h-screen bg-white border-r border-gray-100 z-30 pt-8 shadow-sm">
        <div class="px-6 mb-8 flex items-center gap-3">
            <img src="assets/images/logo.png" alt="Logo" class="h-10 object-contain">
            <span class="font-bold text-xl text-gray-900">Cribot</span>
        </div>
        
        <a href="dashboard.html" class="flex items-center gap-3 px-6 py-4 text-gray-500 hover:bg-gray-50 hover:text-gray-900 font-medium transition-colors">
            <img src="assets/images/icon-home.png" class="h-5 w-5 object-contain"> Início
        </a>
        <a href="mercado.html" class="flex items-center gap-3 px-6 py-4 text-gray-500 hover:bg-gray-50 hover:text-gray-900 font-medium transition-colors">
            <span class="iconify text-xl" data-icon="cryptocurrency-color:btc"></span> Mercado OTC
        </a>
        <a href="auto.html" class="flex items-center gap-3 px-6 py-4 text-gray-500 hover:bg-gray-50 hover:text-gray-900 font-medium transition-colors">
            <img src="assets/images/icon-auto.png" class="h-5 w-5 object-contain"> Robôs Auto
        </a>
        <a href="equipa.html" class="flex items-center gap-3 px-6 py-4 text-gray-500 hover:bg-gray-50 hover:text-gray-900 font-medium transition-colors">
            <img src="assets/images/icon-team.png" class="h-5 w-5 object-contain"> Minha Equipa
        </a>
        <a href="perfil.html" class="flex items-center gap-3 px-6 py-4 text-gray-500 hover:bg-gray-50 hover:text-gray-900 font-medium transition-colors">
            <img src="assets/images/icon-profile.png" class="h-5 w-5 object-contain"> Meu Perfil
        </a>
    </aside>

    <script>
        const API_URL = 'https://twoou3.onrender.com/api';
        let token = localStorage.getItem('token');
        const formatMT = (value) => Number(value).toLocaleString('pt-MZ', { minimumFractionDigits: 2 }) + ' MT';

        document.addEventListener("DOMContentLoaded", async () => {
            if (!token) { window.location.href = 'index.html'; return; }
            await carregarCarteira();
        });

        function exibirToast(texto, tipo = 'info') {
            const caixa = document.getElementById('toastPopup');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMsg');

            caixa.classList.remove('bg-red-500', 'border-red-600', 'bg-gray-900', 'border-gray-800', 'bg-blue-600', 'border-blue-700');
            if (tipo === 'error') {
                 caixa.classList.add('bg-red-500', 'border-red-600'); icon.textContent = "error_outline"; 
            } else if (tipo === 'success') {
                 caixa.classList.add('bg-gray-900', 'border-gray-800'); icon.textContent = "check_circle"; 
            } else {
                 caixa.classList.add('bg-blue-600', 'border-blue-700'); icon.textContent = "info"; 
            }
            
            msg.textContent = texto;
            caixa.style.transform = 'translate(-50%, 0)';
            caixa.style.opacity = '1';

            setTimeout(() => {
                caixa.style.transform = 'translate(-50%, -200%)';
                caixa.style.opacity = '0';
            }, 3500); 
        }

        function abrirModal(id) { document.getElementById(id).classList.add('active'); }
        function fecharModal(id) { document.getElementById(id).classList.remove('active'); }

        async function carregarCarteira() {
            try {
                const resDash = await fetch(`${API_URL}/user/dashboard`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (resDash.status === 401) { localStorage.removeItem('token'); window.location.href = 'index.html'; return; }
                const dataDash = await resDash.json();
                
                if (resDash.ok) {
                    document.getElementById('walletBalance').textContent = formatMT(dataDash.user.balance);
                    document.getElementById('cardUserName').textContent = dataDash.user.name;

                    // AQUI VERIFICA SE ELE TEM PLANO ATIVO PARA PODER LEVANTAR
                    if (!dataDash.activeInvestments || dataDash.activeInvestments.length === 0) {
                        const btnLevantar = document.getElementById('btnLevantarCarteira');
                        btnLevantar.setAttribute('onclick', "exibirToast('Precisa ter uma máquina (plano) ativa para levantar o seu saldo. Adquira um Robô na loja!', 'error')");
                    }
                }

                const resHist = await fetch(`${API_URL}/user/history`, { headers: { 'Authorization': `Bearer ${token}` } });
                const dataHist = await resHist.json();
                
                if (resHist.ok) {
                    renderizarHistorico(dataHist.transactions);
                }
            } catch (err) {
                exibirToast('Não foi possível carregar a carteira.', 'error');
            }
        }

        function renderizarHistorico(transacoes) {
            const container = document.getElementById('transactionsContainer');
            const historicoFiltrado = transacoes.filter(tx => tx.type === 'deposit' || tx.type === 'withdrawal');

            if (!historicoFiltrado || historicoFiltrado.length === 0) {
                container.innerHTML = `
                <div class="flex flex-col items-center justify-center py-8 text-gray-400">
                    <span class="material-icons-outlined text-5xl mb-2 opacity-50">account_balance_wallet</span>
                    <span class="text-sm font-medium mt-2">Nenhuma transação efetuada.</span>
                </div>`;
                return;
            }

            const formatTypes = {
                'deposit': { icon: 'south_west', color: 'text-white', bg: 'bg-[#00c853]', label: 'Depósito' },
                'withdrawal': { icon: 'north_east', color: 'text-white', bg: 'bg-gray-900', label: 'Levantamento' }
            };

            const formatStatus = {
                'pending': { label: 'Pendente', class: 'bg-yellow-500 text-white' },
                'approved': { label: 'Aprovado', class: 'bg-[#00c853] text-white' },
                'completed': { label: 'Concluído', class: 'bg-gray-900 text-white' },
                'rejected': { label: 'Rejeitado', class: 'bg-red-600 text-white' }
            };

            container.innerHTML = historicoFiltrado.map(tx => {
                const conf = formatTypes[tx.type];
                const st = formatStatus[tx.status] || formatStatus['pending'];
                const date = new Date(tx.createdAt).toLocaleDateString('pt-MZ', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
                
                let sign = '+';
                let valColor = 'text-[#00c853]'; 
                if (tx.type === 'withdrawal') { sign = '-'; valColor = 'text-gray-900'; }

                return `
                <div class="flex items-center justify-between py-4 border-b border-gray-200/60 last:border-0 hover:bg-gray-100/50 transition-colors px-1">
                    <div class="flex items-center gap-3.5">
                        <div class="w-11 h-11 rounded-xl ${conf.bg} ${conf.color} flex items-center justify-center shrink-0 shadow-md">
                            <span class="material-icons-outlined">${conf.icon}</span>
                        </div>
                        <div class="flex flex-col">
                            <span class="font-black text-gray-900 text-sm">${conf.label}</span>
                            <span class="text-[0.65rem] text-gray-500 font-bold tracking-wide">${date}</span>
                        </div>
                    </div>
                    <div class="flex flex-col items-end gap-1.5">
                        <span class="font-black ${valColor} text-base leading-none">${sign}${formatMT(tx.amount)}</span>
                        <span class="text-[0.55rem] font-black uppercase tracking-widest px-2 py-0.5 rounded-sm ${st.class}">${st.label}</span>
                    </div>
                </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
