<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cribot - Levantar</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: { extend: { colors: { bitcoin: '#F7931A' }, fontFamily: { inter: ['Inter', 'sans-serif'] } } }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-24 md:pb-8 bg-white relative">

    <div id="toastPopup" class="fixed top-6 left-1/2 transform -translate-x-1/2 -translate-y-[200%] px-5 py-3 rounded-xl flex items-center gap-3 text-white font-medium transition-all duration-500 opacity-0 z-[99999] min-w-max border shadow-2xl pointer-events-none">
        <span id="toastIcon" class="material-icons text-xl">info</span>
        <span id="toastMsg" class="text-[0.85rem] font-bold">Notificação</span>
    </div>

    <!-- CABEÇALHO -->
    <div class="pt-6 pb-4 px-4 relative z-10 flex flex-col items-center border-b border-gray-100 bg-white">
        <div class="w-full max-w-lg flex justify-start items-center gap-3">
            <button onclick="window.history.back()" class="text-gray-500 hover:text-gray-900 active:scale-95 transition-transform flex items-center justify-center bg-gray-50 h-10 w-10 rounded-xl border border-gray-200 shadow-sm">
                <span class="material-icons text-lg">arrow_back</span>
            </button>
            <h1 class="text-xl font-black text-gray-900">Novo Levantamento</h1>
        </div>
    </div>

    <!-- TELA DE BLOQUEIO DINÂMICA (Inativo / Conta Não Cadastrada) -->
    <div id="noAccountBlock" class="hidden flex-1 w-full max-w-lg mx-auto px-5 pt-12 flex-col items-center text-center">
        <!-- Conteúdo Injetado via JS -->
    </div>

    <!-- FORMULÁRIO DE SAQUE -->
    <main id="withdrawMain" class="hidden flex-1 w-full max-w-lg mx-auto px-4 pt-6 flex-col relative z-10">
        
        <div class="flex items-center gap-3 mb-6 pb-4 border-b border-gray-100" id="metodoHeader">
            <span class="text-xs text-gray-400 font-bold">A carregar detalhes...</span>
        </div>

        <form id="formSaque" class="flex flex-col gap-4">

            <div class="flex flex-col gap-1.5 w-full">
                <label class="text-[0.70rem] font-bold text-gray-600 uppercase tracking-widest">Valor a Levantar (MT)</label>
                <input type="number" id="wdAmount" required placeholder="A carregar limites..." class="w-full rounded-xl border border-gray-300 py-3.5 px-4 text-gray-900 font-black text-lg focus:border-gray-900 focus:ring-1 focus:ring-gray-900 outline-none transition-colors">
            </div>

            <div class="bg-gray-50 border border-gray-200 rounded-xl p-4 mt-2 mb-2 relative">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-[0.70rem] font-bold text-gray-500 uppercase tracking-widest flex items-center gap-1"><span class="material-icons text-sm">lock</span> Conta Destino Validada</span>
                    <a href="cadastrar-numero.html" class="text-[0.65rem] font-bold text-blue-600 hover:text-blue-800 underline uppercase tracking-widest">Alterar Config.</a>
                </div>
                
                <div class="flex flex-col gap-3">
                    <div class="flex flex-col">
                        <label class="text-[0.60rem] font-bold text-gray-400 uppercase tracking-widest mb-0.5">Seu Número Oficial</label>
                        <input type="tel" id="wdAddress" readonly class="w-full bg-transparent text-gray-900 font-black text-lg outline-none pointer-events-none">
                    </div>
                    
                    <div class="flex flex-col">
                        <label class="text-[0.60rem] font-bold text-gray-400 uppercase tracking-widest mb-0.5">Nome da Entidade</label>
                        <input type="text" id="wdAccountName" readonly class="w-full bg-transparent text-gray-900 font-black outline-none pointer-events-none">
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-1.5 w-full mt-2">
                <label class="text-[0.70rem] font-bold text-gray-600 uppercase tracking-widest text-center">PIN de Segurança (4 Dígitos)</label>
                <input type="password" id="wdPin" required maxlength="4" placeholder="****" class="w-full rounded-xl border border-gray-300 py-3.5 px-4 text-gray-900 font-black tracking-widest text-xl text-center focus:border-gray-900 focus:ring-1 focus:ring-gray-900 outline-none transition-colors">
            </div>

            <button type="submit" id="btnWd" class="w-full bg-gray-900 text-white font-black py-4 rounded-xl mt-4 active:scale-95 transition-transform flex justify-center items-center gap-2 shadow-md hover:bg-black">
                Solicitar Levantamento <span class="material-icons">arrow_forward</span>
            </button>
            
        </form>

    </main>

    <script>
        const API_URL = 'https://twoou3.onrender.com/api';
        let token = localStorage.getItem('token');
        
        let minWd = 100;
        let maxWd = 100000;
        let userBalance = 0;

        const formatMT = (value) => Number(value).toLocaleString('pt-MZ', { minimumFractionDigits: 2 }) + ' MT';

        document.addEventListener("DOMContentLoaded", async () => {
            if (!token) { window.location.href = 'index.html'; return; }
            
            try {
                const dashRes = await fetch(`${API_URL}/user/dashboard`, { headers: { 'Authorization': `Bearer ${token}` } });
                const dashData = await dashRes.json();
                
                if (dashRes.ok && dashData.user) {
                    userBalance = dashData.user.balance || 0; 

                    // REGRA DE SEGURANÇA VISUAL - BLOQUEIO DE BÓNUS SEM PLANO
                    if (!dashData.activeInvestments || dashData.activeInvestments.length === 0) {
                        const block = document.getElementById('noAccountBlock');
                        block.classList.remove('hidden');
                        block.classList.add('flex');
                        block.innerHTML = `
                            <span class="material-icons text-red-500 mb-4" style="font-size: 5rem;">smart_toy</span>
                            <h2 class="text-xl font-black text-gray-900 mb-2">Plano Inativo</h2>
                            <p class="text-sm text-gray-500 font-medium mb-8">Para realizar levantamentos na plataforma, é obrigatório ter uma máquina IA (plano) ativa e operando no sistema. Adquira o seu robô para desbloquear saques.</p>
                            <button onclick="window.location.href='auto.html'" class="w-full bg-[#00c853] hover:bg-[#00e676] text-white font-black py-4 rounded-xl shadow-md active:scale-95 transition-transform flex items-center justify-center gap-2">
                                Ir para Loja de Robôs <span class="material-icons text-lg">arrow_forward</span>
                            </button>
                        `;
                    } 
                    // SE NÃO TIVER CONTA DE SAQUE SALVA
                    else if (!dashData.user.withdrawalNumber || !dashData.user.withdrawalName) {
                        const block = document.getElementById('noAccountBlock');
                        block.classList.remove('hidden');
                        block.classList.add('flex');
                        block.innerHTML = `
                            <span class="material-icons text-gray-300 mb-4" style="font-size: 5rem;">account_balance_wallet</span>
                            <h2 class="text-xl font-black text-gray-900 mb-2">Conta Não Cadastrada</h2>
                            <p class="text-sm text-gray-500 font-medium mb-8">Para realizar levantamentos, você precisa de cadastrar a sua conta M-Pesa / e-Mola oficial no sistema primeiro.</p>
                            <button onclick="window.location.href='cadastrar-numero.html'" class="w-full bg-gray-900 hover:bg-black text-white font-black py-4 rounded-xl shadow-md active:scale-95 transition-transform flex items-center justify-center gap-2">
                                Cadastrar Conta Agora <span class="material-icons text-lg">arrow_forward</span>
                            </button>
                        `;
                    } 
                    // TUDO CERTO, EXIBE O FORMULÁRIO
                    else {
                        document.getElementById('withdrawMain').classList.remove('hidden');
                        document.getElementById('withdrawMain').classList.add('flex');
                        
                        document.getElementById('wdAddress').value = dashData.user.withdrawalNumber;
                        document.getElementById('wdAccountName').value = dashData.user.withdrawalName;
                    }
                }
            } catch(e) {}

            const urlParams = new URLSearchParams(window.location.search);
            const metodo = urlParams.get('metodo');
            const header = document.getElementById('metodoHeader');
            
            if(metodo === 'emola') {
                header.innerHTML = `
                    <img src="assets/images/logo-emola.png" class="h-12 w-12 object-cover rounded-xl shadow-sm border border-gray-100 shrink-0">
                    <div class="flex flex-col">
                        <span class="text-[0.65rem] font-bold text-gray-400 uppercase tracking-widest">Levantar para o e-Mola</span>
                        <span class="font-black text-gray-900 text-sm">Receba em poucos minutos</span>
                    </div>
                `;
            } else {
                header.innerHTML = `
                    <img src="assets/images/logo-mpesa.png" class="h-12 w-12 object-cover rounded-xl shadow-sm border border-gray-100 shrink-0">
                    <div class="flex flex-col">
                        <span class="text-[0.65rem] font-bold text-gray-400 uppercase tracking-widest">Levantar para o M-Pesa</span>
                        <span class="font-black text-gray-900 text-sm">Receba em poucos minutos</span>
                    </div>
                `;
            }

            try {
                const res = await fetch(`${API_URL}/user/settings`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                if (res.ok) {
                    minWd = data.minWithdraw || 100;
                    maxWd = data.maxWithdraw || 100000;
                    document.getElementById('wdAmount').placeholder = `Min: ${minWd} | Max: ${maxWd}`;
                    document.getElementById('wdAmount').min = minWd;
                    document.getElementById('wdAmount').max = maxWd;
                }
            } catch(e) {}
        });

        function exibirToast(texto, tipo = 'info') {
            const caixa = document.getElementById('toastPopup');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMsg');

            caixa.classList.remove('bg-red-500', 'border-red-600', 'bg-gray-900', 'border-gray-800');
            if (tipo === 'error') {
                 caixa.classList.add('bg-red-500', 'border-red-600'); icon.textContent = "error_outline"; 
            } else {
                 caixa.classList.add('bg-gray-900', 'border-gray-800'); icon.textContent = "check_circle"; 
            }
            
            msg.textContent = texto;
            caixa.style.transform = 'translate(-50%, 0)';
            caixa.style.opacity = '1';

            setTimeout(() => {
                caixa.style.transform = 'translate(-50%, -200%)';
                caixa.style.opacity = '0';
            }, 3000); 
        }

        document.getElementById('formSaque').addEventListener('submit', async (e) => {
            e.preventDefault();
            const amount = Number(document.getElementById('wdAmount').value);
            const pin = document.getElementById('wdPin').value;

            if (amount > userBalance) {
                return exibirToast(`Saldo insuficiente. O seu saldo atual é de ${formatMT(userBalance)}.`, 'error');
            }

            if (amount < minWd) return exibirToast(`O levantamento mínimo é de ${minWd} MT.`, 'error');
            if (amount > maxWd) return exibirToast(`O levantamento máximo é de ${maxWd} MT.`, 'error');

            const btn = document.getElementById('btnWd');
            btn.disabled = true; btn.innerHTML = 'Processando...';

            try {
                const res = await fetch(`${API_URL}/user/withdraw`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ amount, pin })
                });
                const data = await res.json();

                if (res.ok) {
                    exibirToast(data.message || 'Saque Solicitado!', 'success');
                    setTimeout(() => window.location.href = 'carteira.html', 1500);
                } else {
                    exibirToast(data.error || 'Erro na transação.', 'error');
                    btn.disabled = false; btn.innerHTML = `Solicitar Levantamento <span class="material-icons">arrow_forward</span>`;
                    document.getElementById('wdPin').value = ''; 
                }
            } catch (err) { 
                exibirToast('Erro de conexão com o servidor.', 'error');
                btn.disabled = false; btn.innerHTML = `Solicitar Levantamento <span class="material-icons">arrow_forward</span>`; 
            }
        });
    </script>
</body>
</html>
