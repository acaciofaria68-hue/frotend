<!DOCTYPE html>
<html lang="pt-MZ">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cribot - Levantar</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: { extend: { colors: { bitcoin: '#F7931A' }, fontFamily: { inter: ['Inter', 'sans-serif'] } } }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-24 md:pb-8 bg-white relative">

    <div id="toastPopup" class="fixed top-6 left-1/2 transform -translate-x-1/2 -translate-y-[200%] px-5 py-3 rounded-sm flex items-center gap-3 text-white font-medium transition-all duration-500 opacity-0 z-[9999] min-w-max border shadow-2xl pointer-events-none">
        <span id="toastIcon" class="material-icons text-xl">info</span>
        <span id="toastMsg" class="text-[0.85rem] font-bold">Notificação</span>
    </div>

    <!-- CABEÇALHO -->
    <div class="pt-6 pb-4 px-4 relative z-10 flex flex-col items-center border-b border-gray-100 bg-white">
        <div class="w-full max-w-lg flex justify-start items-center gap-3">
            <button onclick="window.history.back()" class="text-gray-500 hover:text-gray-900 active:scale-95 transition-transform flex items-center justify-center bg-gray-50 h-10 w-10 rounded-sm border border-gray-200 shadow-sm">
                <span class="material-icons text-lg">arrow_back</span>
            </button>
            <h1 class="text-xl font-black text-gray-900">Novo Levantamento</h1>
        </div>
    </div>

    <!-- FORMULÁRIO -->
    <main class="flex-1 w-full max-w-lg mx-auto px-4 pt-6 flex flex-col relative z-10">
        
        <div class="flex items-center gap-3 mb-6 pb-4 border-b border-gray-100" id="metodoHeader">
            <!-- Ícone via JS -->
        </div>

        <form id="formSaque" class="flex flex-col gap-4">

            <div class="flex flex-col gap-1.5 w-full">
                <label class="text-[0.70rem] font-bold text-gray-600 uppercase tracking-widest">Valor a Levantar (MT)</label>
                <input type="number" id="wdAmount" required min="100" placeholder="Ex: 500" class="w-full rounded-sm border border-gray-300 py-3 px-3 text-gray-900 font-black text-base focus:border-gray-900 focus:ring-1 focus:ring-gray-900 outline-none transition-colors">
            </div>

            <div class="flex flex-col gap-1.5 w-full">
                <label class="text-[0.70rem] font-bold text-gray-600 uppercase tracking-widest" id="labelNumero">Seu Número</label>
                <input type="tel" id="wdAddress" required placeholder="Número válido" class="w-full rounded-sm border border-gray-300 py-3 px-3 text-gray-900 font-black focus:border-gray-900 focus:ring-1 focus:ring-gray-900 outline-none transition-colors">
            </div>

            <div class="flex flex-col gap-1.5 w-full">
                <label class="text-[0.70rem] font-bold text-gray-600 uppercase tracking-widest">PIN de Segurança</label>
                <input type="password" id="wdPin" required maxlength="4" placeholder="****" class="w-full rounded-sm border border-gray-300 py-3 px-3 text-gray-900 font-black tracking-widest text-xl text-center focus:border-gray-900 focus:ring-1 focus:ring-gray-900 outline-none transition-colors">
            </div>

            <button type="submit" id="btnWd" class="w-full bg-gray-900 text-white font-black py-3 rounded-sm mt-4 active:scale-95 transition-transform flex justify-center items-center gap-2 shadow-sm hover:bg-black">
                Solicitar Levantamento <span class="material-icons">arrow_forward</span>
            </button>
        </form>

    </main>

    <script>
        const API_URL = 'https://twoou3.onrender.com/api';
        let token = localStorage.getItem('token');
        
        document.addEventListener("DOMContentLoaded", () => {
            if (!token) { window.location.href = 'index.html'; return; }
            
            const urlParams = new URLSearchParams(window.location.search);
            const metodo = urlParams.get('metodo');
            
            const header = document.getElementById('metodoHeader');
            const labelNumero = document.getElementById('labelNumero');
            
            if(metodo === 'emola') {
                labelNumero.innerText = "Seu Número e-Mola";
                header.innerHTML = `
                    <img src="https://i.ibb.co/sJyN7pV8/unnamed.png" class="h-10 w-10 object-cover rounded-sm shadow-sm border border-gray-100">
                    <div class="flex flex-col">
                        <span class="text-[0.65rem] font-bold text-gray-400 uppercase tracking-widest">Levantar para o e-Mola</span>
                        <span class="font-black text-gray-900 text-sm">Receba em poucos minutos</span>
                    </div>
                `;
            } else {
                labelNumero.innerText = "Seu Número M-Pesa";
                header.innerHTML = `
                    <img src="https://i.ibb.co/4w55BkYL/images.png" class="h-10 w-10 object-cover rounded-sm shadow-sm border border-gray-100">
                    <div class="flex flex-col">
                        <span class="text-[0.65rem] font-bold text-gray-400 uppercase tracking-widest">Levantar para o M-Pesa</span>
                        <span class="font-black text-gray-900 text-sm">Receba em poucos minutos</span>
                    </div>
                `;
            }
        });

        function exibirToast(texto, tipo = 'info') {
            const caixa = document.getElementById('toastPopup');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMsg');

            caixa.classList.remove('bg-red-500', 'border-red-600', 'bg-gray-900', 'border-gray-800');
            if (tipo === 'error') {
                 caixa.classList.add('bg-red-500', 'border-red-600'); icon.textContent = "error_outline"; 
            } else {
                 caixa.classList.add('bg-gray-900', 'border-gray-800'); icon.textContent = "check_circle"; 
            }
            
            msg.textContent = texto;
            caixa.style.transform = 'translate(-50%, 0)';
            caixa.style.opacity = '1';

            setTimeout(() => {
                caixa.style.transform = 'translate(-50%, -200%)';
                caixa.style.opacity = '0';
            }, 3000); 
        }

        document.getElementById('formSaque').addEventListener('submit', async (e) => {
            e.preventDefault();
            const amount = document.getElementById('wdAmount').value;
            const address = document.getElementById('wdAddress').value;
            const pin = document.getElementById('wdPin').value;
            const btn = document.getElementById('btnWd');
            
            btn.disabled = true; btn.innerHTML = 'Processando...';

            try {
                const res = await fetch(`${API_URL}/user/withdraw`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ amount, address, pin })
                });
                const data = await res.json();

                if (res.ok) {
                    exibirToast(data.message, 'success');
                    setTimeout(() => window.location.href = 'carteira.html', 1500);
                } else {
                    exibirToast(data.error, 'error');
                    btn.disabled = false; btn.innerHTML = `Solicitar Levantamento <span class="material-icons">arrow_forward</span>`;
                }
            } catch (err) { 
                exibirToast('Erro de conexão.', 'error');
                btn.disabled = false; btn.innerHTML = `Solicitar Levantamento <span class="material-icons">arrow_forward</span>`; 
            }
        });
    </script>
</body>
</html>
