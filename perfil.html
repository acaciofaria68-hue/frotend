                    <input type="checkbox" name="toggle" id="somToggle" class="toggle-checkbox absolute block w-6 h-6 rounded-full bg-white border-4 appearance-none cursor-pointer transition-all duration-300 z-10" onclick="alternarSomSistema()"/>
                    <label for="somToggle" class="toggle-label block overflow-hidden h-6 rounded-full bg-gray-300 cursor-pointer transition-colors duration-300"></label>

            <button onclick="window.open('https://wa.me/258XXXXXXXXX', '_blank')" class="w-full flex items-center justify-between p-3.5 hover:bg-gray-50 active:bg-gray-100 rounded-2xl transition-colors">
                <div class="flex items-center gap-4">

                    <div class="flex flex-col text-left">

            <!-- AQUI: Redirecionamento para a página de Termos e Condições -->

    <!-- MENU INFERIOR MOBILE -->

            <a href="dashboard.html" class="flex flex-col items-center justify-center text-gray-400 hover:text-gray-900 w-14 transition-colors">

            </a>
            
            <a href="mercado.html" class="flex flex-col items-center justify-center text-gray-400 hover:text-gray-900 w-14 transition-colors">

            <a href="auto.html" class="flex flex-col items-center justify-center text-gray-400 hover:text-gray-900 w-14 transition-colors">
                <img src="https://i.ibb.co/S4Z2THnC/77032-removebg-preview.png" alt="Auto" class="h-6 w-6 object-contain mb-1">
                <span class="text-[0.65rem] font-medium">Auto</span>
            </a>

            <a href="equipa.html" class="flex flex-col items-center justify-center text-gray-400 hover:text-gray-900 w-14 transition-colors">

                <span class="text-[0.65rem] font-medium">Equipa</span>
            </a>
            
            <a href="perfil.html" class="flex flex-col items-center justify-center text-bitcoin w-14 transition-transform active:scale-95">
                <img src="https://i.ibb.co/RTrC0N4B/1780052456588.png" alt="Perfil" class="h-6 w-6 object-contain mb-1">
                <span class="text-[0.65rem] font-bold">Perfil</span>
            </a>
            
        </div>
    </nav>

    <!-- MENU LATERAL DESKTOP -->
    <aside class="hidden md:flex flex-col fixed top-0 left-0 w-64 h-screen bg-white border-r border-gray-100 z-30 pt-8 shadow-sm">
        <div class="px-6 mb-8 flex items-center gap-3">
            <img src="https://i.ibb.co/V07K9jG2/Boneco-3-D-CRIBOT-com-Dinheiro.png" alt="Logo" class="h-10 object-contain">
            <span class="font-bold text-xl text-gray-900">Cribot</span>
        </div>
        
        <a href="dashboard.html" class="flex items-center gap-3 px-6 py-4 text-gray-500 hover:bg-gray-50 hover:text-gray-900 font-medium transition-colors">
            <img src="https://i.ibb.co/HThdL6Zc/76505-removebg-preview.png" class="h-5 w-5 object-contain"> Início
        </a>
        <a href="mercado.html" class="flex items-center gap-3 px-6 py-4 text-gray-500 hover:bg-gray-50 hover:text-gray-900 font-medium transition-colors">
            <span class="iconify text-xl" data-icon="cryptocurrency-color:btc"></span> Mercado OTC
        </a>
        <a href="auto.html" class="flex items-center gap-3 px-6 py-4 text-gray-500 hover:bg-gray-50 hover:text-gray-900 font-medium transition-colors">
            <img src="https://i.ibb.co/S4Z2THnC/77032-removebg-preview.png" class="h-5 w-5 object-contain"> Robôs Auto
        </a>
        <a href="equipa.html" class="flex items-center gap-3 px-6 py-4 text-gray-500 hover:bg-gray-50 hover:text-gray-900 font-medium transition-colors">
            <img src="https://i.ibb.co/1fFPT3J0/teams-3d-icon-png-download-8894250.png" class="h-5 w-5 object-contain"> Minha Equipa
        </a>
        
        <a href="perfil.html" class="flex items-center gap-3 px-6 py-4 text-bitcoin bg-orange-50 font-bold border-r-4 border-bitcoin">
            <img src="https://i.ibb.co/RTrC0N4B/1780052456588.png" class="h-5 w-5 object-contain"> Meu Perfil
        </a>
    </aside>

    <script>
        const API_URL = 'https://twoou3.onrender.com/api';
        let token = localStorage.getItem('token');

        document.addEventListener("DOMContentLoaded", async () => {
            if (!token) { window.location.href = 'index.html'; return; }
            await carregarPerfil();
            carregarConfiguracaoSom();
        });

        function exibirToast(texto, tipo = 'info') {
            const caixa = document.getElementById('toastPopup');
            const icon = document.getElementById('toastIcon');
            const msg = document.getElementById('toastMsg');

            caixa.classList.remove('bg-red-500', 'border-red-600', 'bg-gray-900', 'border-gray-800', 'bg-blue-600', 'border-blue-700');
            
            if (tipo === 'error') {
                 caixa.classList.add('bg-red-500', 'border-red-600'); icon.textContent = "error_outline"; 
            } else if (tipo === 'info') {
                 caixa.classList.add('bg-blue-600', 'border-blue-700'); icon.textContent = "info"; 
            } else {
                 caixa.classList.add('bg-gray-900', 'border-gray-800'); icon.textContent = "check_circle"; 
            }
            
            msg.textContent = texto;
            caixa.style.transform = 'translate(-50%, 0)';
            caixa.style.opacity = '1';

            setTimeout(() => {
                caixa.style.transform = 'translate(-50%, -200%)';
                caixa.style.opacity = '0';
            }, 3500); 
        }

        async function carregarPerfil() {
            try {
                const res = await fetch(`${API_URL}/user/dashboard`, { headers: { 'Authorization': `Bearer ${token}` } });
                
                if (res.status === 401) {
                    localStorage.removeItem('token');
                    window.location.href = 'index.html';
                    return;
                }
                
                const data = await res.json();
                
                if (res.ok && data.user) {
                    document.getElementById('userName').textContent = data.user.name;
                    document.getElementById('userEmail').textContent = data.user.email;
                    document.getElementById('userInitial').textContent = data.user.name.charAt(0).toUpperCase();
                }
            } catch (err) {
                exibirToast('Não foi possível conectar ao servidor.', 'error');
            }
        }

        function carregarConfiguracaoSom() {
            const toggle = document.getElementById('somToggle');
            const estadoSom = localStorage.getItem('somCribot');
            
            if (estadoSom === 'desativado') {
                toggle.checked = false;
            } else {
                toggle.checked = true;
                localStorage.setItem('somCribot', 'ativo');
            }
        }

        function alternarSomSistema() {
            const toggle = document.getElementById('somToggle');
            if (toggle.checked) {
                localStorage.setItem('somCribot', 'ativo');
                exibirToast('Efeitos sonoros ativados!', 'success');
            } else {
                localStorage.setItem('somCribot', 'desativado');
                exibirToast('Efeitos sonoros desativados.', 'info');
            }
        }

        function confirmarSaida() {
            const confirmacao = confirm("Tem certeza que deseja encerrar a sessão?");
            if (confirmacao) {
                localStorage.removeItem('token');
                window.location.href = 'index.html';
            }
        }
    </script>
